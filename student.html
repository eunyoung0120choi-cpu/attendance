```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>출석체크</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;justify-content:center;padding:2rem 1rem 3rem}
.app{width:100%;max-width:420px}
.card{background:#fff;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:1.75rem 1.5rem;margin-bottom:1rem}
.hdr{text-align:center;margin-bottom:1.75rem}
.hdr-icon{width:68px;height:68px;background:#dbeafe;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .9rem;font-size:30px}
.hdr h1{font-size:26px;font-weight:700;color:#111827;margin-bottom:.3rem}
.hdr p{font-size:15px;color:#6b7280}
.pin-row{display:flex;gap:12px;justify-content:center;margin-bottom:1.5rem}
.pin-box{width:66px;height:74px;border:1.5px solid #d1d5db;border-radius:12px;font-size:30px;font-weight:700;background:#f9fafb;color:#111827;display:flex;align-items:center;justify-content:center;transition:.15s}
.pin-box.active{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.18);background:#fff}
.pin-box.filled{border-color:#9ca3af;background:#fff}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.num-btn{height:60px;border:1px solid #e5e7eb;border-radius:12px;background:#f9fafb;color:#111827;font-size:22px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent;transition:.1s}
.num-btn:active{background:#e5e7eb;transform:scale(.95)}
.del-btn{font-size:18px;color:#6b7280}
.empty-btn{background:transparent;border-color:transparent;pointer-events:none}
.btn-primary{width:100%;height:56px;border-radius:12px;background:#3b82f6;color:#fff;border:none;font-size:18px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:1.25rem;transition:.15s}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-primary:not(:disabled):active{transform:scale(.98)}
.btn-green{width:100%;height:54px;border-radius:12px;background:#dcfce7;color:#15803d;border:1.5px solid #86efac;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer;transition:.15s}
.btn-green:active{transform:scale(.98)}
.btn-ghost{width:100%;height:48px;border-radius:10px;background:transparent;color:#6b7280;border:1px solid #d1d5db;font-size:15px;font-family:inherit;cursor:pointer;transition:.15s}
.result{border-radius:14px;padding:1.4rem;margin-top:.75rem;display:none;animation:slideUp .3s ease}
.result.show{display:block}
.result.found{background:#f0fdf4;border:1px solid #86efac}
.result.error{background:#fef2f2;border:1px solid #fca5a5}
.result.done{background:#f0fdf4;border:2px solid #22c55e}
.result-name{font-size:22px;font-weight:700;color:#15803d;margin-bottom:.3rem}
.result-sub{font-size:14px;color:#6b7280;margin-bottom:1.1rem}
.result-error{font-size:16px;font-weight:500;color:#dc2626}
.done-icon{width:56px;height:56px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:26px;border:2px solid #86efac;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275)}
.done-msg{font-size:21px;font-weight:700;color:#15803d;text-align:center;margin-bottom:.4rem}
.done-sub{font-size:14px;color:#6b7280;text-align:center;margin-bottom:1.1rem}
.loader{display:none;justify-content:center;align-items:center;gap:10px;padding:1.1rem 0;color:#6b7280;font-size:15px}
.loader.show{display:flex}
.spinner{width:22px;height:22px;border:2.5px solid #e5e7eb;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
@media(max-width:360px){.pin-box{width:54px;height:64px;font-size:24px}.num-btn{height:52px;font-size:19px}}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <div class="hdr">
      <div class="hdr-icon">📋</div>
      <h1>출석체크</h1>
      <p>핸드폰 번호 뒷자리 4자리를 입력하세요</p>
    </div>
    <div class="pin-row">
      <div class="pin-box active" id="p0"></div>
      <div class="pin-box" id="p1"></div>
      <div class="pin-box" id="p2"></div>
      <div class="pin-box" id="p3"></div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="pressNum('1')">1</button>
      <button class="num-btn" onclick="pressNum('2')">2</button>
      <button class="num-btn" onclick="pressNum('3')">3</button>
      <button class="num-btn" onclick="pressNum('4')">4</button>
      <button class="num-btn" onclick="pressNum('5')">5</button>
      <button class="num-btn" onclick="pressNum('6')">6</button>
      <button class="num-btn" onclick="pressNum('7')">7</button>
      <button class="num-btn" onclick="pressNum('8')">8</button>
      <button class="num-btn" onclick="pressNum('9')">9</button>
      <button class="num-btn empty-btn"></button>
      <button class="num-btn" onclick="pressNum('0')">0</button>
      <button class="num-btn del-btn" onclick="pressBack()">⌫</button>
    </div>
    <button class="btn-primary" id="searchBtn" disabled onclick="doSearch()">조회하기</button>
  </div>
  <div class="loader" id="loader"><div class="spinner"></div><span id="loaderMsg">조회 중...</span></div>
  <div class="result" id="resultCard"><div id="resultInner"></div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKhTkI0yNVBAScE_Tqx2laMJKNVsc172s",
  authDomain: "attendance-626af.firebaseapp.com",
  projectId: "attendance-626af",
  storageBucket: "attendance-626af.firebasestorage.app",
  messagingSenderId: "485800201487",
  appId: "1:485800201487:web:b72138f378556c9be7c27a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let digits = [];
let foundId = null;
let foundName = null;

window.pressNum = function(n) {
  if (digits.length >= 4) return;
  digits.push(n);
  updatePins();
  if (digits.length === 4) document.getElementById('searchBtn').disabled = false;
};

window.pressBack = function() {
  if (!digits.length) return;
  digits.pop();
  document.getElementById('searchBtn').disabled = true;
  hideResult();
  updatePins();
};

function updatePins() {
  for (let i = 0; i < 4; i++) {
    const b = document.getElementById('p' + i);
    b.textContent = digits[i] ? '●' : '';
    b.classList.remove('active', 'filled');
    if (i === digits.length) b.classList.add('active');
    else if (digits[i]) b.classList.add('filled');
  }
}

window.doSearch = async function() {
  if (digits.length !== 4) return;
  hideResult();
  showLoader(true, '조회 중...');
  const last4 = digits.join('');
  try {
    const snap = await getDocs(collection(db, 'members'));
    const matched = [];
    snap.forEach(d => {
      const data = d.data();
      const phone = String(data.phone || '').replace(/-/g, '');
      if (phone && phone.endsWith(last4)) matched.push({ id: d.id, ...data });
    });
    showLoader(false);
    if (matched.length === 0) {
      showResult('error', '<div class="result-error">⚠ 일치하는 번호를 찾을 수 없습니다.</div>');
      return;
    }
    if (matched.length > 1) {
      showResult('error', '<div class="result-error">⚠ 동일한 번호가 여러 명 존재합니다. 관리자에게 문의하세요.</div>');
      return;
    }
    const m = matched[0];
    foundId = m.id;
    foundName = m.name;
    if (m.attended) {
      showResult('found',
        '<div class="result-name">' + m.name + ' 님</div>' +
        '<div class="result-sub" style="color:#15803d;font-weight:500">이미 출석 완료된 사용자입니다 ✓</div>'
      );
      return;
    }
    showResult('found',
      '<div class="result-name">' + m.name + ' 님</div>' +
      '<div class="result-sub">출석체크 버튼을 눌러 출석을 완료하세요</div>' +
      '<button class="btn-green" id="attendBtn">✓ 출석체크</button>'
    );
    document.getElementById('attendBtn').addEventListener('click', doAttend);
  } catch(e) {
    showLoader(false);
    showResult('error', '<div class="result-error">⚠ 오류가 발생했습니다: ' + e.message + '</div>');
  }
};

async function doAttend() {
  if (!foundId) return;
  showLoader(true, '출석 처리 중...');
  hideResult();
  try {
    await updateDoc(doc(db, 'members', foundId), { attended: true, attendedAt: new Date().toISOString() });
    showLoader(false);
    showResult('done',
      '<div class="done-icon">✓</div>' +
      '<div class="done-msg">출석이 완료되었습니다!</div>' +
      '<div class="done-sub">' + foundName + ' 님의 출석이 기록되었습니다</div>' +
      '<button class="btn-ghost" id="resetBtn">처음으로 돌아가기</button>'
    );
    document.getElementById('resetBtn').addEventListener('click', doReset);
    digits = [];
    updatePins();
    document.getElementById('searchBtn').disabled = true;
  } catch(e) {
    showLoader(false);
    showResult('error', '<div class="result-error">⚠ 오류가 발생했습니다: ' + e.message + '</div>');
  }
}

function doReset() {
  digits = [];
  updatePins();
  document.getElementById('searchBtn').disabled = true;
  hideResult();
}

function showResult(type, html) {
  const rc = document.getElementById('resultCard');
  rc.className = 'result show ' + type;
  document.getElementById('resultInner').innerHTML = html;
}

function hideResult() {
  document.getElementById('resultCard').className = 'result';
  foundId = null;
  foundName = null;
}

function showLoader(show, msg) {
  document.getElementById('loader').classList.toggle('show', show);
  document.getElementById('searchBtn').style.display = show ? 'none' : '';
  if (msg) document.getElementById('loaderMsg').textContent = msg;
}
</script>
</body>
</html>
