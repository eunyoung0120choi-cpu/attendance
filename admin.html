<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>출석 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;justify-content:center;padding:2rem 1rem 3rem}
.app{width:100%;max-width:540px}
.card{background:#fff;border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:1.5rem;margin-bottom:1rem}
.lock-wrap{text-align:center;padding:1.5rem .5rem}
.lock-icon{font-size:52px;margin-bottom:1rem}
.lock-title{font-size:22px;font-weight:700;color:#111827;margin-bottom:.4rem}
.lock-sub{font-size:15px;color:#6b7280;margin-bottom:1.5rem}
.lock-error{font-size:13px;color:#dc2626;margin-top:.6rem;min-height:20px}
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.page-title{font-size:20px;font-weight:700;color:#111827}
.btn-lock{height:36px;padding:0 .85rem;border-radius:8px;background:transparent;color:#6b7280;border:1px solid #d1d5db;font-size:13px;font-family:inherit;cursor:pointer}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.stat-card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);padding:1rem;text-align:center;cursor:pointer;transition:.15s;border:2px solid transparent}
.stat-card:hover{border-color:#e5e7eb}
.stat-card.selected{border-color:#3b82f6}
.stat-card.blue .stat-num{color:#2563eb}
.stat-card.green .stat-num{color:#16a34a}
.stat-card.gray .stat-num{color:#6b7280}
.stat-num{font-size:26px;font-weight:700;margin-bottom:.2rem}
.stat-label{font-size:12px;color:#6b7280}
.section-title{font-size:15px;font-weight:500;color:#374151;margin-bottom:.85rem}
.field-row{margin-bottom:.85rem}
.field-label{display:block;font-size:13px;color:#6b7280;margin-bottom:.35rem}
input[type=text],input[type=tel],input[type=password]{width:100%;height:44px;border:1px solid #d1d5db;border-radius:10px;padding:0 .85rem;font-size:16px;font-family:inherit;background:#fff;color:#111827;outline:none;transition:.15s}
input[type=text]:focus,input[type=tel]:focus,input[type=password]:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.btn-primary{width:100%;height:50px;border-radius:12px;background:#3b82f6;color:#fff;border:none;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;transition:.15s}
.btn-primary:active{transform:scale(.98)}
.btn-danger{height:36px;padding:0 1rem;border-radius:8px;background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;font-size:13px;font-family:inherit;cursor:pointer}
.btn-danger:hover{background:#fee2e2}
.btn-gray{height:40px;padding:0 1rem;border-radius:8px;background:#f3f4f6;color:#374151;border:1px solid #d1d5db;font-size:13px;font-family:inherit;cursor:pointer}
.btn-gray:hover{background:#e5e7eb}
.btn-green2{height:40px;padding:0 1rem;border-radius:8px;background:#f0fdf4;color:#15803d;border:1px solid #86efac;font-size:13px;font-family:inherit;cursor:pointer}
.btn-green2:hover{background:#dcfce7}
.btn-active{height:36px;padding:0 1rem;border-radius:8px;background:#3b82f6;color:#fff;border:none;font-size:13px;font-family:inherit;cursor:pointer}
.btn-active.on{background:#16a34a}
.session-list{display:flex;flex-direction:column;gap:8px}
.session-item{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1rem;border-radius:10px;border:1px solid #e5e7eb;background:#f9fafb;cursor:pointer;transition:.15s}
.session-item.active{background:#eff6ff;border-color:#93c5fd}
.session-item:hover{background:#f3f4f6}
.session-left{display:flex;flex-direction:column;gap:3px}
.session-name{font-size:15px;font-weight:500;color:#111827}
.session-date{font-size:12px;color:#6b7280}
.session-right{display:flex;align-items:center;gap:8px}
.badge-active{font-size:11px;font-weight:600;background:#dbeafe;color:#1d4ed8;padding:2px 8px;border-radius:20px}
.badge-inactive{font-size:11px;color:#9ca3af;padding:2px 8px}
.csv-area{background:#f9fafb;border:1.5px dashed #d1d5db;border-radius:10px;padding:1.1rem;text-align:center;cursor:pointer;transition:.15s;margin-bottom:.85rem}
.csv-area:hover{border-color:#3b82f6;background:#eff6ff}
.csv-btns{display:flex;gap:8px}
/* 필터 탭 */
.filter-tabs{display:flex;gap:6px;margin-bottom:.85rem}
.filter-tab{flex:1;height:36px;border-radius:8px;border:1px solid #e5e7eb;background:#f9fafb;color:#6b7280;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:.15s}
.filter-tab.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
/* 명단 */
.list-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.list-count{font-size:13px;color:#6b7280}
.member-list{display:flex;flex-direction:column;gap:8px}
.member-item{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px}
.member-info{display:flex;flex-direction:column;gap:2px}
.member-name{font-size:15px;font-weight:500;color:#111827}
.member-phone{font-size:12px;color:#6b7280}
.member-time{font-size:11px;color:#9ca3af;margin-top:1px}
.member-right{display:flex;align-items:center;gap:8px}
.badge-done{font-size:12px;font-weight:600;background:#dcfce7;color:#15803d;padding:3px 10px;border-radius:20px}
.badge-none{font-size:12px;font-weight:500;background:#f3f4f6;color:#9ca3af;padding:3px 10px;border-radius:20px}
.del-btn-sm{width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:#f87171;font-size:18px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.del-btn-sm:hover{background:#fee2e2}
.empty-state{text-align:center;padding:2rem;color:#9ca3af;font-size:14px}
/* 페이지네이션 */
.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:1rem}
.page-btn{width:36px;height:36px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;color:#374151;font-size:14px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.page-btn:hover{background:#f3f4f6}
.page-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.page-info{font-size:13px;color:#6b7280}
.loader{display:none;justify-content:center;align-items:center;gap:10px;padding:1.5rem;color:#6b7280;font-size:14px}
.loader.show{display:flex}
.spinner{width:20px;height:20px;border:2.5px solid #e5e7eb;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);background:#1f2937;color:#fff;padding:.65rem 1.25rem;border-radius:10px;font-size:14px;opacity:0;transition:.3s;white-space:nowrap;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.divider{border:none;border-top:1px solid #f3f4f6;margin:.85rem 0}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">

  <div id="lockScreen" class="card">
    <div class="lock-wrap">
      <div class="lock-icon">🔒</div>
      <div class="lock-title">관리자 전용</div>
      <div class="lock-sub">비밀번호를 입력하세요</div>
      <input type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkPw()"/>
      <div class="lock-error" id="pwError"></div>
      <button class="btn-primary" style="margin-top:1rem" onclick="checkPw()">확인</button>
    </div>
  </div>

  <div id="adminContent" style="display:none">
    <div class="page-hdr">
      <div class="page-title">📋 출석 관리자</div>
      <button class="btn-lock" onclick="lockAdmin()">🔒 잠금</button>
    </div>

    <div class="card">
      <div class="section-title">교육 목록</div>
      <div class="session-list" id="sessionList">
        <div class="empty-state">등록된 교육이 없습니다.</div>
      </div>
      <hr class="divider"/>
      <div class="section-title" style="margin-bottom:.5rem">새 교육 만들기</div>
      <div class="field-row">
        <label class="field-label">교육명</label>
        <input type="text" id="sessionName" placeholder="대리 승진자 교육" maxlength="30"/>
      </div>
      <button class="btn-primary" onclick="createSession()">교육 만들기</button>
    </div>

    <div id="selectedPanel" style="display:none">

      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <div style="font-size:17px;font-weight:700;color:#111827" id="selectedName"></div>
            <div style="font-size:12px;color:#6b7280;margin-top:2px" id="selectedDate"></div>
          </div>
          <button class="btn-active" id="activateBtn" onclick="toggleActive()"></button>
        </div>
      </div>

      <!-- 통계 (클릭하면 필터) -->
      <div class="stats">
        <div class="stat-card blue" id="statAll" onclick="setFilter('all')">
          <div class="stat-num" id="statTotal">0</div>
          <div class="stat-label">전체</div>
        </div>
        <div class="stat-card green" id="statAttended" onclick="setFilter('attended')">
          <div class="stat-num" id="statDone">0</div>
          <div class="stat-label">출석</div>
        </div>
        <div class="stat-card gray" id="statAbsentCard" onclick="setFilter('absent')">
          <div class="stat-num" id="statAbsent">0</div>
          <div class="stat-label">미출석</div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">CSV 일괄 등록</div>
        <div class="csv-area" onclick="document.getElementById('csvFile').click()">
          <div style="font-size:24px;margin-bottom:.3rem">📂</div>
          <div style="font-size:14px;color:#6b7280">CSV 파일 클릭해서 선택</div>
          <div style="font-size:12px;color:#9ca3af;margin-top:.2rem">이름, 핸드폰번호 형식</div>
        </div>
        <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="handleCsv(this)"/>
        <div class="csv-btns">
          <button class="btn-gray" style="flex:1" onclick="downloadTemplate()">📥 양식 다운로드</button>
          <button class="btn-green2" style="flex:1" onclick="downloadResult()">📤 결과 내보내기</button>
        </div>
      </div>

      <div class="card">
        <div class="section-title">개별 등록</div>
        <div class="field-row">
          <label class="field-label">이름</label>
          <input type="text" id="newName" placeholder="홍길동" maxlength="20"/>
        </div>
        <div class="field-row">
          <label class="field-label">핸드폰 번호</label>
          <input type="tel" id="newPhone" placeholder="010-1234-5678" maxlength="13"/>
        </div>
        <button class="btn-primary" style="margin-top:.25rem" onclick="addMember()">등록하기</button>
      </div>

      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem">
          <div class="section-title" style="margin-bottom:0">교육생 명단</div>
          <div style="display:flex;gap:8px">
            <button class="btn-danger" onclick="resetAllAttendance()">출석 초기화</button>
            <button class="btn-danger" onclick="deleteSession()">교육 삭제</button>
          </div>
        </div>

        <!-- 필터 탭 -->
        <div class="filter-tabs">
          <button class="filter-tab active" id="tab-all" onclick="setFilter('all')">전체</button>
          <button class="filter-tab" id="tab-attended" onclick="setFilter('attended')">출석</button>
          <button class="filter-tab" id="tab-absent" onclick="setFilter('absent')">미출석</button>
        </div>

        <div class="list-header-row">
          <div class="list-count" id="listCount"></div>
        </div>

        <div class="loader" id="listLoader"><div class="spinner"></div><span>불러오는 중...</span></div>
        <div class="member-list" id="memberList"></div>

        <!-- 페이지네이션 -->
        <div class="pagination" id="pagination"></div>
      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, deleteDoc, onSnapshot, orderBy, query, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKhTkI0yNVBAScE_Tqx2laMJKNVsc172s",
  authDomain: "attendance-626af.firebaseapp.com",
  projectId: "attendance-626af",
  storageBucket: "attendance-626af.firebasestorage.app",
  messagingSenderId: "485800201487",
  appId: "1:485800201487:web:b72138f378556c9be7c27a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const ADMIN_PW = '1234';
const PAGE_SIZE = 10;

let sessions = [];
let currentSessionId = null;
let currentMembers = [];
let memberUnsub = null;
let currentFilter = 'all';
let currentPage = 1;

/* ── 비밀번호 ── */
window.checkPw = function() {
  const val = document.getElementById('pwInput').value;
  if (val === ADMIN_PW) {
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    loadSessions();
  } else {
    document.getElementById('pwError').textContent = '비밀번호가 올바르지 않습니다.';
    document.getElementById('pwInput').value = '';
  }
};

window.lockAdmin = function() {
  if (memberUnsub) { memberUnsub(); memberUnsub = null; }
  document.getElementById('adminContent').style.display = 'none';
  document.getElementById('lockScreen').style.display = 'block';
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').textContent = '';
};

/* ── 교육 목록 ── */
async function loadSessions() {
  const snap = await getDocs(query(collection(db, 'sessions'), orderBy('createdAt', 'desc')));
  sessions = [];
  snap.forEach(d => sessions.push({ id: d.id, ...d.data() }));
  renderSessions();
}

function renderSessions() {
  const list = document.getElementById('sessionList');
  if (!sessions.length) { list.innerHTML = '<div class="empty-state">등록된 교육이 없습니다.</div>'; return; }
  list.innerHTML = sessions.map(s => `
    <div class="session-item ${s.id === currentSessionId ? 'active' : ''}" onclick="selectSession('${s.id}')">
      <div class="session-left">
        <div class="session-name">${s.name}</div>
        <div class="session-date">${new Date(s.createdAt).toLocaleDateString('ko-KR')}</div>
      </div>
      <div class="session-right">
        ${s.isActive ? '<span class="badge-active">진행중</span>' : '<span class="badge-inactive">대기</span>'}
      </div>
    </div>`).join('');
}

/* ── 교육 선택 ── */
window.selectSession = function(id) {
  if (memberUnsub) { memberUnsub(); memberUnsub = null; }
  currentSessionId = id;
  currentFilter = 'all';
  currentPage = 1;
  const s = sessions.find(x => x.id === id);
  document.getElementById('selectedPanel').style.display = 'block';
  document.getElementById('selectedName').textContent = s.name;
  document.getElementById('selectedDate').textContent = new Date(s.createdAt).toLocaleDateString('ko-KR') + ' 생성';
  const btn = document.getElementById('activateBtn');
  btn.textContent = s.isActive ? '✓ 진행중' : '활성화';
  btn.className = s.isActive ? 'btn-active on' : 'btn-active';
  setFilterTab('all');
  renderSessions();
  listenMembers();
};

/* ── 활성화 토글 ── */
window.toggleActive = async function() {
  const s = sessions.find(x => x.id === currentSessionId);
  if (!s) return;
  if (!s.isActive) {
    const batch = writeBatch(db);
    sessions.filter(x => x.isActive).forEach(x => batch.update(doc(db, 'sessions', x.id), { isActive: false }));
    batch.update(doc(db, 'sessions', currentSessionId), { isActive: true });
    await batch.commit();
  } else {
    await updateDoc(doc(db, 'sessions', currentSessionId), { isActive: false });
  }
  await loadSessions();
  selectSession(currentSessionId);
  showToast(s.isActive ? '비활성화되었습니다' : '활성화되었습니다!');
};

/* ── 교육 만들기 ── */
window.createSession = async function() {
  const name = document.getElementById('sessionName').value.trim();
  if (!name) { showToast('교육명을 입력해주세요'); return; }
  try {
    const ref = await addDoc(collection(db, 'sessions'), { name, isActive: false, createdAt: new Date().toISOString() });
    document.getElementById('sessionName').value = '';
    await loadSessions();
    selectSession(ref.id);
    showToast(name + ' 교육이 만들어졌습니다');
  } catch(e) { showToast('오류: ' + e.message); }
};

/* ── 교육 삭제 ── */
window.deleteSession = async function() {
  const s = sessions.find(x => x.id === currentSessionId);
  if (!confirm(s.name + ' 교육을 삭제하시겠습니까? 명단도 모두 삭제됩니다.')) return;
  try {
    const snap = await getDocs(collection(db, 'sessions', currentSessionId, 'members'));
    const batch = writeBatch(db);
    snap.forEach(d => batch.delete(d.ref));
    batch.delete(doc(db, 'sessions', currentSessionId));
    await batch.commit();
    currentSessionId = null;
    document.getElementById('selectedPanel').style.display = 'none';
    await loadSessions();
    showToast('삭제되었습니다');
  } catch(e) { showToast('오류: ' + e.message); }
};

/* ── 명단 실시간 구독 ── */
function listenMembers() {
  document.getElementById('listLoader').classList.add('show');
  const q = query(collection(db, 'sessions', currentSessionId, 'members'), orderBy('createdAt', 'asc'));
  memberUnsub = onSnapshot(q, snap => {
    document.getElementById('listLoader').classList.remove('show');
    currentMembers = [];
    snap.forEach(d => currentMembers.push({ id: d.id, ...d.data() }));
    updateStats(currentMembers);
    renderFiltered();
  }, err => {
    document.getElementById('listLoader').classList.remove('show');
    showToast('오류: ' + err.message);
  });
}

/* ── 통계 ── */
function updateStats(members) {
  const done = members.filter(m => m.attended).length;
  document.getElementById('statTotal').textContent = members.length;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statAbsent').textContent = members.length - done;
}

/* ── 필터 ── */
window.setFilter = function(f) {
  currentFilter = f;
  currentPage = 1;
  setFilterTab(f);
  renderFiltered();
};

function setFilterTab(f) {
  ['all','attended','absent'].forEach(x => {
    document.getElementById('tab-' + x).classList.toggle('active', x === f);
  });
  ['statAll','statAttended','statAbsentCard'].forEach((id, i) => {
    const f2 = ['all','attended','absent'][i];
    document.getElementById(id).classList.toggle('selected', f2 === f);
  });
}

function getFiltered() {
  if (currentFilter === 'attended') return currentMembers.filter(m => m.attended);
  if (currentFilter === 'absent') return currentMembers.filter(m => !m.attended);
  return currentMembers;
}

/* ── 렌더링 (페이지네이션 포함) ── */
function renderFiltered() {
  const filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const paged = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('listCount').textContent =
    (currentFilter === 'all' ? '전체' : currentFilter === 'attended' ? '출석' : '미출석') +
    ' ' + total + '명 · ' + currentPage + ' / ' + totalPages + ' 페이지';

  const list = document.getElementById('memberList');
  if (!paged.length) {
    list.innerHTML = '<div class="empty-state">해당하는 교육생이 없습니다.</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  list.innerHTML = paged.map(m => {
    const time = m.attendedAt ? new Date(m.attendedAt).toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="member-item">
      <div class="member-info">
        <div class="member-name">${m.name}</div>
        <div class="member-phone">${m.phone}</div>
        ${time ? '<div class="member-time">출석 ' + time + '</div>' : ''}
      </div>
      <div class="member-right">
        ${m.attended ? '<span class="badge-done">출석 ✓</span>' : '<span class="badge-none">미출석</span>'}
        <button class="del-btn-sm" onclick="deleteMember('${m.id}','${m.name}')">×</button>
      </div>
    </div>`;
  }).join('');

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;

  for (let i = 1; i <= totalPages; i++) {
    if (totalPages > 7 && i > 2 && i < totalPages - 1 && Math.abs(i - currentPage) > 1) {
      if (i === 3 || i === totalPages - 2) html += `<span class="page-info">…</span>`;
      continue;
    }
    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }

  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  pg.innerHTML = html;
}

window.goPage = function(p) {
  const totalPages = Math.ceil(getFiltered().length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderFiltered();
  document.getElementById('memberList').scrollIntoView({behavior:'smooth', block:'start'});
};

/* ── 교육생 추가 ── */
window.addMember = async function() {
  if (!currentSessionId) { showToast('교육을 먼저 선택해주세요'); return; }
  const name = document.getElementById('newName').value.trim();
  const phone = document.getElementById('newPhone').value.trim();
  if (!name) { showToast('이름을 입력해주세요'); return; }
  if (!phone) { showToast('핸드폰 번호를 입력해주세요'); return; }
  const clean = phone.replace(/-/g, '');
  if (!/^\d{9,11}$/.test(clean)) { showToast('올바른 핸드폰 번호를 입력해주세요'); return; }
  try {
    await addDoc(collection(db, 'sessions', currentSessionId, 'members'), { name, phone, attended: false, createdAt: new Date().toISOString() });
    document.getElementById('newName').value = '';
    document.getElementById('newPhone').value = '';
    showToast(name + ' 님이 등록되었습니다');
  } catch(e) { showToast('오류: ' + e.message); }
};

/* ── 교육생 삭제 ── */
window.deleteMember = async function(id, name) {
  if (!confirm(name + ' 님을 삭제하시겠습니까?')) return;
  try {
    await deleteDoc(doc(db, 'sessions', currentSessionId, 'members', id));
    showToast('삭제되었습니다');
  } catch(e) { showToast('오류: ' + e.message); }
};

/* ── 출석 초기화 ── */
window.resetAllAttendance = async function() {
  if (!confirm('모든 출석을 초기화하시겠습니까?')) return;
  try {
    const snap = await getDocs(collection(db, 'sessions', currentSessionId, 'members'));
    const batch = writeBatch(db);
    snap.forEach(d => batch.update(d.ref, { attended: false, attendedAt: null }));
    await batch.commit();
    showToast('출석이 초기화되었습니다');
  } catch(e) { showToast('오류: ' + e.message); }
};

/* ── CSV 양식 다운로드 ── */

/* ── CSV 업로드 ── */
window.handleCsv = function(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async function(e) {
    const text = e.target.result;
    const lines = text.split('\n').map(l => l.trim()).filter(l => l);
    const start = (lines[0].includes('이름') || lines[0].toLowerCase().includes('name')) ? 1 : 0;
    const toAdd = [];
    for (let i = start; i < lines.length; i++) {
      const cols = lines[i].split(',');
      const name = (cols[0] || '').trim();
      const phone = (cols[1] || '').trim();
      if (!name || !phone) continue;
      const clean = phone.replace(/-/g, '');
      if (!/^\d{9,11}$/.test(clean)) continue;
      toAdd.push({ name, phone });
    }
    if (!toAdd.length) { showToast('유효한 데이터가 없습니다'); input.value = ''; return; }
    if (!confirm(toAdd.length + '명을 등록하시겠습니까?')) { input.value = ''; return; }
    try {
      const now = new Date().toISOString();
      await Promise.all(toAdd.map(m => addDoc(collection(db, 'sessions', currentSessionId, 'members'), { ...m, attended: false, createdAt: now })));
      showToast(toAdd.length + '명이 등록되었습니다');
    } catch(e) { showToast('오류: ' + e.message); }
    input.value = '';
  };
  reader.readAsText(file, 'UTF-8');
};

/* ── 출석 결과 내보내기 ── */
window.downloadResult = function() {
  if (!currentMembers.length) { showToast('명단이 없습니다'); return; }
  const s = sessions.find(x => x.id === currentSessionId);
  let csv = '\uFEFF이름,핸드폰번호,출석여부,출석시간\n';
  currentMembers.forEach(m => {
    const time = m.attendedAt ? new Date(m.attendedAt).toLocaleString('ko-KR') : '';
    csv += `${m.name},${m.phone},${m.attended ? '출석' : '미출석'},${time}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (s ? s.name : '출석결과') + '_' + new Date().toLocaleDateString('ko-KR').replace(/\. /g,'-').replace('.','') + '.csv';
  a.click();
};

/* ── 핸드폰 하이픈 ── */
document.getElementById('newPhone').addEventListener('input', function() {
  let v = this.value.replace(/\D/g, '');
  if (v.length <= 3) this.value = v;
  else if (v.length <= 7) this.value = v.slice(0,3) + '-' + v.slice(3);
  else this.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
